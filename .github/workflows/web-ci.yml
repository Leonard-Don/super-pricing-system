name: web-ci
on:
  push:
    paths: ['frontend/**', '.github/workflows/web-ci.yml']
  pull_request:
    paths: ['frontend/**', '.github/workflows/web-ci.yml']
jobs:
  web:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npm run lint
      - run: npm test
      - run: npm run build
