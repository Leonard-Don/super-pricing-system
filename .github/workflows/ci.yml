name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  ###########################################################################
  # 代码质量 / 安全 — 高价值门禁强制，历史长尾规则仍 advisory
  ###########################################################################
  quality:
    name: Lint / Type / Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt
          pip install ruff pip-audit

      - name: ruff (pyflakes baseline gate)
        run: python scripts/check_ruff_pyflakes_baseline.py

      - name: bandit (medium/high gate)
        run: bandit -r backend src -c pyproject.toml --severity-level medium

      - name: pip-audit (runtime gate)
        run: pip-audit -r requirements.txt --strict

      - name: ruff (lint, advisory)
        run: ruff check backend src
        continue-on-error: true

      - name: ruff (format check, advisory)
        run: ruff format --check backend src
        continue-on-error: true

      - name: mypy (advisory)
        run: mypy backend src
        continue-on-error: true

      - name: bandit (advisory)
        run: bandit -r backend src -c pyproject.toml
        continue-on-error: true

  ###########################################################################
  # 后端测试 — 全量 unit + 集成
  ###########################################################################
  backend:
    name: Backend tests (full)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ENVIRONMENT: test
      DISABLE_NONCRITICAL_STARTUP_TASKS: "1"
      AUTH_SECRET: "ci-non-secret-fixture-key"

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run unit + integration tests
        run: |
          pytest tests/unit tests/integration \
            --maxfail=20 \
            --timeout=180 \
            --cov=backend \
            --cov=src \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            -q

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  ###########################################################################
  # 前端测试 + 构建
  ###########################################################################
  frontend:
    name: Frontend tests + build
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci --legacy-peer-deps

      - name: npm audit (runtime gate)
        run: npm audit --omit=dev --audit-level=high

      - name: Run full Jest suite
        run: CI=1 npm test -- --runInBand --watchAll=false --passWithNoTests

      - name: Build frontend
        run: npm run build

  ###########################################################################
  # 浏览器端到端
  ###########################################################################
  research-e2e:
    name: Research E2E (Playwright)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    needs: [backend, frontend]

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            frontend/package-lock.json
            tests/e2e/package-lock.json

      - name: Install backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci --legacy-peer-deps

      - name: Install research E2E dependencies
        working-directory: tests/e2e
        run: npm ci

      - name: Install Playwright Chromium
        working-directory: tests/e2e
        run: npx playwright install --with-deps chromium

      - name: Run research E2E suite
        working-directory: tests/e2e
        env:
          DISABLE_NONCRITICAL_STARTUP_TASKS: "1"
          AUTH_SECRET: "ci-non-secret-fixture-key"
        run: npm run verify:research

      - name: Upload research E2E artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: research-e2e-artifacts
          if-no-files-found: ignore
          path: |
            output/playwright/**
            logs/**
