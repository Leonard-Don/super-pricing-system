name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.13"
  NODE_VERSION: "22"

jobs:
  ###########################################################################
  # 代码质量 / 安全 — 高价值门禁强制，历史长尾规则仍 advisory
  ###########################################################################
  quality:
    name: Lint / Type / Security
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements.lock

      - name: Install backend dependencies (lock + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.txt
          pip install ruff pip-audit

      - name: ruff (pyflakes baseline gate)
        run: python scripts/check_ruff_pyflakes_baseline.py

      - name: bandit (medium/high gate)
        run: bandit -r backend src -c pyproject.toml --severity-level medium

      - name: pip-audit (runtime gate, against lock)
        run: |
          # PYSEC-2024-277 (joblib) still ships no fixed release; keep it ignored
          # so the gate stays strict for every other finding.
          # PYSEC-2025-183 (pyjwt) was cleared by bumping pyjwt to its fixed
          # release (2.13.0), so its ignore was dropped.
          # Revisit on each dependency bump — drop the matching --ignore-vuln
          # once a fixed release exists.
          pip-audit -r requirements.lock --strict \
            --ignore-vuln PYSEC-2024-277

      - name: mypy (incremental gate)
        run: bash scripts/check_mypy_gate.sh

      - name: ruff (lint, advisory)
        run: ruff check backend src
        continue-on-error: true

      - name: ruff (format check, advisory)
        run: ruff format --check backend src
        continue-on-error: true

      - name: bandit (advisory)
        run: bandit -r backend src -c pyproject.toml
        continue-on-error: true

  ###########################################################################
  # 后端测试 — 全量 unit + 集成
  ###########################################################################
  backend:
    name: Backend tests (full)
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      ENVIRONMENT: test
      DISABLE_NONCRITICAL_STARTUP_TASKS: "1"
      AUTH_SECRET: "ci-non-secret-fixture-key"

    steps:
      - name: Checkout
        shell: bash
        working-directory: ${{ github.workspace }}
        run: |
          git init .
          git remote add origin "https://github.com/${{ github.repository }}.git"
          git fetch --depth=1 origin "${GITHUB_SHA}"
          git checkout --detach FETCH_HEAD
          git config --global --add safe.directory "${GITHUB_WORKSPACE}"

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: pip
          cache-dependency-path: |
            requirements.txt
            requirements-dev.txt
            requirements.lock

      - name: Install backend dependencies (lock + dev tools)
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.lock
          pip install -r requirements-dev.txt

      - name: Run unit + integration tests
        run: |
          pytest tests/unit tests/integration \
            --maxfail=20 \
            --timeout=180 \
            --cov=backend \
            --cov=src \
            --cov-fail-under=62 \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            -q

      - name: OpenAPI contract diff (no breaking changes)
        run: python scripts/check_openapi_diff.py

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: backend-coverage
          path: coverage.xml
          if-no-files-found: ignore

  # NOTE: Legacy "Frontend tests + build" job (cd frontend && npm ci/test/build)
  # and "Research E2E (Playwright)" job (targeting old frontend/) were removed
  # as part of P4 cutover — frontend/ is being retired.
  # web/ frontend (Vite/React 19/TS) is already covered by web-ci.yml.
  # web/ E2E is future work.
