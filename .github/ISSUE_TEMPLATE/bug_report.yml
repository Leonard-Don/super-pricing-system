name: Bug report
description: Report a reproducible defect in Super Pricing System
title: "[Bug] "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is broken?
      placeholder: A concise description of the bug
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the exact steps to trigger the issue
      placeholder: |
        1. Go to ...
        2. Click ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Browser / OS / Python / Node version if relevant
      placeholder: macOS + Chrome 136 / Python 3.11 / Node 20
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste stack traces, API responses, or screenshots if available
