[alembic]
# Database migration configuration for the PostgreSQL/TimescaleDB schema.
# SQLite (default local dev driver) continues to use the inline bootstrap in
# backend/app/core/persistence/_manager.py and is intentionally NOT managed by
# this configuration.

script_location = alembic
prepend_sys_path = .
version_path_separator = os
sqlalchemy.url =

# env.py reads DATABASE_URL from the process environment when sqlalchemy.url
# is empty, so production / CI invocations only need to export DATABASE_URL.

[post_write_hooks]

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
